name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  package-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install build
      - name: Build source and wheel distributions
        run: python -m build
      - name: Secret audit
        run: python -m pip install -e . && python -m ctrsdf.utils.secret_audit --root .
