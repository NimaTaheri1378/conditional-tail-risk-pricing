name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Compile source
        run: python -m compileall -q src tests
      - name: Run tests
        run: python -m pytest
      - name: Secret audit
        run: python -m ctrsdf.utils.secret_audit --root .
