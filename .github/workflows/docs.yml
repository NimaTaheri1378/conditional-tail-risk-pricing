name: docs

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e .
      - name: Check required public docs
        run: |
          test -f README.md
          test -f DATA_ACCESS.md
          test -f docs/replication.md
          test -f docs/release/release_checklist.md
      - name: Secret audit
        run: python -m ctrsdf.utils.secret_audit --root .
